<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-itunes-app" content="app-id=123456789">
    <title>Lavblue – Download App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a237e, #0d47a1, #1565c0, #1976d2);
            padding: 1rem;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #1a237e;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #546e7a;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem 1.25rem;
            margin: 0.6rem 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #ffffff;
            gap: 0.75rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            font-size: 1.3rem;
            line-height: 1;
        }

        .btn-app {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: #fff;
        }

        .btn-google {
            background: #4285F4;
        }

        .btn-whatsapp {
            background: #25D366;
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .btn-facebook {
            background: #1877F2;
        }

        .separator {
            margin: 1.5rem 0 1rem;
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #cfd8dc, transparent);
        }

        .footer-note {
            color: #78909c;
            font-size: 0.8rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Lavblue</div>
        <div class="subtitle">Connect with us</div>

        <!-- App Download Button -->
        <button class="btn btn-app" id="appBtn">
            <span class="btn-icon">📲</span> Download App
        </button>

        <hr class="separator">

        <!-- Other buttons -->
        <a class="btn btn-google" href="https://www.google.com/search?q=Lavblue" target="_blank" rel="noopener">
            <span class="btn-icon">🔍</span> Google
        </a>
        <a class="btn btn-whatsapp" href="https://wa.me/1234567890?text=Hi%20Lavblue" target="_blank" rel="noopener">
            <span class="btn-icon">💬</span> WhatsApp
        </a>
        <a class="btn btn-instagram" href="https://instagram.com/lavblue" target="_blank" rel="noopener">
            <span class="btn-icon">📷</span> Instagram
        </a>
        <a class="btn btn-facebook" href="https://facebook.com/lavblue" target="_blank" rel="noopener">
            <span class="btn-icon">👍</span> Facebook
        </a>

        <div class="footer-note">© 2025 Lavblue. All rights reserved.</div>
    </div>

    <script>
        document.getElementById('appBtn').addEventListener('click', function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.lavblue.app';
            const appStoreUrl = 'https://apps.apple.com/app/lavblue/id123456789';

            // Android detection
            if (/android/i.test(userAgent)) {
                window.location.href = playStoreUrl;
            }
            // iOS detection (iPhone, iPad, iPod)
            else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // Direct redirection – user gesture prevents white screen
                window.location.href = appStoreUrl;
            }
            // Fallback for desktop or other devices – open both stores or modal?
            else {
                // You can show a small modal or just redirect to a generic page
                // Here we simply open App Store as default (most common)
                window.location.href = appStoreUrl;
            }
        });
    </script>
</body>
</html>
