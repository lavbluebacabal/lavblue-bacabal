<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavblue Bacabal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #0a2540;
color: #fff;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
padding: 20px;
}
.container {
max-width: 400px;
width: 100%;
text-align: center;
}
.logo-container {
margin-bottom: 30px;
padding: 10px;
}
.logo-container img {
max-width: 100%;
height: auto;
display: block;
margin: 0 auto;
}
.subtitle {
font-size: 1rem;
color: #ccc;
margin-bottom: 30px;
}
.buttons {
display: flex;
flex-direction: column;
gap: 15px;
}
.btn {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 15px 20px;
border: none;
border-radius: 50px;
font-size: 1.1rem;
font-weight: 600;
text-decoration: none;
color: #fff;
cursor: pointer;
transition: transform 0.2s, box-shadow 0.2s;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}
.btn i {
font-size: 1.3rem;
width: 24px;
text-align: center;
}
.btn:hover {
transform: translateY(-3px);
box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}
.btn:active {
transform: translateY(0);
}
.btn-google {
background: linear-gradient(135deg, #4285F4, #35b853);
}
.btn-whatsapp {
background: linear-gradient(135deg, #25D366, #128C7E);
}
.btn-instagram {
background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF);
}
.btn-facebook {
background: linear-gradient(135deg, #1877F2, #0C5B9A);
}
.btn-app {
background: linear-gradient(135deg, #00b0f0, #0a2540);
border: 2px solid #00b0f0;
}
.footer {
margin-top: 30px;
font-size: 0.8rem;
color: #88a;
}
@media (max-width: 480px) {
.btn {
font-size: 1rem;
padding: 12px 15px;
}
}
</style>
</head>
<body>
<div class="container">
<div class="logo-container">
<img src="https://lavblue.com.br/wp-content/uploads/2024/08/LOGO-LAVBLUE-2024-02-1024x300.png" alt="Lavblue Logo">
</div>
<p class="subtitle">Unidade Bacabal - Sua lavanderia de confiança</p>
<div class="buttons">
<a href="#" class="btn btn-app" id="app-link">
<i class="fas fa-mobile-alt"></i> Baixe o App
</a>
<a href="https://g.page/r/Ca8efY-Cw3JVEAI/review" target="_blank" class="btn btn-google">
<i class="fab fa-google"></i> Avalie no Google
</a>
<a href="https://wa.me/5599984243919?text=Olá!" target="_blank" class="btn btn-whatsapp">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>
<a href="https://www.instagram.com/lavbluebacabal/" target="_blank" class="btn btn-instagram">
<i class="fab fa-instagram"></i> Instagram
</a>
<a href="https://www.facebook.com/lavbluebacabal/" target="_blank" class="btn btn-facebook">
<i class="fab fa-facebook-f"></i> Facebook
</a>
</div>
<div class="footer">
© 2026 Lavblue.com - Todos os direitos reservados.
</div>
</div>
<script>
(function() {
var appLink = document.getElementById('app-link');
var userAgent = navigator.userAgent || navigator.vendor || window.opera;
appLink.addEventListener('click', function(e) {
e.preventDefault();
if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
window.location.href = 'https://apps.apple.com/br/app/lavblue-com/id6446894086';
} else if (/android/i.test(userAgent)) {
window.location.href = 'https://play.google.com/store/apps/details?id=com.cicclo.lavblue';
} else {
window.location.href = 'https://play.google.com/store/apps/details?id=com.cicclo.lavblue';
}
});
})();
</script>
</body>
</html>
