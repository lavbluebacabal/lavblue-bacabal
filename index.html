<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LavBlue - Baixe o App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a2540;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .container {
      background: #0d2f4a;
      border-radius: 20px;
      padding: 40px 30px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .logo {
      max-width: 250px;
      width: 100%;
      height: auto;
      margin-bottom: 30px;
    }
    h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p.sub {
      color: #a0c4e0;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 12px;
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn-google {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
    }
    .btn-whatsapp {
      background: linear-gradient(135deg, #25d366 0%, #128C7E 100%);
    }
    .btn-instagram {
      background: linear-gradient(135deg, #f58529 0%, #dd2a7b 50%, #8134af 100%);
    }
    .btn-facebook {
      background: linear-gradient(135deg, #3b5998 0%, #8b9dc3 100%);
    }
    .btn-app {
      background: linear-gradient(135deg, #0f9d58 0%, #1e8e3e 100%);
    }
    .btn i {
      font-size: 20px;
    }
    .separator {
      margin: 20px 0;
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }
    /* Spinner */
    #loading-spinner {
      display: none;
      margin: 15px auto;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #redirection-message {
      display: none;
      color: #a0c4e0;
      font-size: 14px;
      margin-top: 10px;
    }
    .footer-text {
      color: #6090b0;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="https://lavblue.com.br/wp-content/uploads/2024/08/LOGO-LAVBLUE-2024-02-1024x300.png" alt="LavBlue Logo">
    <h1>Baixe o App</h1>
    <p class="sub">Lavanderia inteligente na palma da sua mão</p>

    <button class="btn btn-google" onclick="window.open('https://play.google.com/store/apps/details?id=com.cicclo.lavblue', '_blank')">
      <i class="fab fa-google-play"></i> Google Play
    </button>
    <button class="btn btn-whatsapp" onclick="window.open('https://wa.me/5511999999999', '_blank')">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </button>
    <button class="btn btn-instagram" onclick="window.open('https://www.instagram.com/lavblue/', '_blank')">
      <i class="fab fa-instagram"></i> Instagram
    </button>
    <button class="btn btn-facebook" onclick="window.open('https://www.facebook.com/lavblue/', '_blank')">
      <i class="fab fa-facebook-f"></i> Facebook
    </button>

    <hr class="separator">

    <button class="btn btn-app" id="btn-baixe-app" onclick="redirectToApp()">
      <i class="fas fa-download"></i> Baixe o App
    </button>

    <div id="loading-spinner"></div>
    <div id="redirection-message">Redirecionando para loja de aplicativos...</div>

    <p class="footer-text">Ao clicar, você será direcionado à loja oficial.</p>
  </div>

  <script>
    function redirectToApp() {
      // Show spinner and message
      document.getElementById('loading-spinner').style.display = 'block';
      document.getElementById('redirection-message').style.display = 'block';

      // Detect platform and set URL
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      var appUrl;

      if (/android/i.test(userAgent)) {
        appUrl = 'https://play.google.com/store/apps/details?id=com.cicclo.lavblue';
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        appUrl = 'https://apps.apple.com/us/app/lavblue-com/id6750488253';
      } else {
        // Fallback for desktop / others
        appUrl = 'https://play.google.com/store/apps/details?id=com.cicclo.lavblue';
      }

      // Delay to show spinner, then redirect
      setTimeout(function() {
        window.location.href = appUrl;
      }, 2000);
    }
  </script>
</body>
</html>
